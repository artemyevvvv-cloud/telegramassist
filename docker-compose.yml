services:
  telegram-bot:
    build: ./src/bot
    env_file: .env
    environment:
      - MEMORY_PATH=/app/memory
      - KB_PATH=/app/knowledge-base/aizdec
      - GITHUB_REPO_URL=${GITHUB_REPO_URL}
      - DASHBOARD_URL=${DASHBOARD_URL}
    volumes:
      - ./memory:/app/memory
      - ./knowledge-base:/app/knowledge-base
      - ./.git:/app/.git
    restart: unless-stopped

  mcp-server:
    build: ./src/mcp
    env_file: .env
    environment:
      - MEMORY_PATH=/app/memory
      - KB_PATH=/app/knowledge-base/aizdec
      - DB_PATH=/app/data/logs.db
    volumes:
      - ./memory:/app/memory
      - ./knowledge-base:/app/knowledge-base
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
