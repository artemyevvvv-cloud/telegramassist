<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading screen -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>

  <!-- Error screen -->
  <div id="error" class="error-screen hidden">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p id="error-msg">Не удалось загрузить данные</p>
  </div>

  <!-- Main screen -->
  <div id="main" class="main hidden">
    <header class="header">
      <h1 class="header-title">Прогресс</h1>
      <span class="header-updated" id="last-updated"></span>
    </header>

    <div class="cards-grid">

      <!-- Learning card -->
      <div class="card" data-section="learning" role="button" tabindex="0" aria-label="Учёба — подробнее">
        <div class="card-header">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <span class="card-label">Учёба</span>
        </div>
        <div class="card-metric" id="learning-metric">—</div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="learning-progress" style="width:0%"></div>
        </div>
        <div class="card-status" id="learning-status">Загрузка…</div>
      </div>

      <!-- Workouts card -->
      <div class="card" data-section="workouts" role="button" tabindex="0" aria-label="Тренировки — подробнее">
        <div class="card-header">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 9.5h2v5H3z"/><path d="M19 9.5h2v5h-2z"/><path d="M5 12h14"/></svg>
          </div>
          <span class="card-label">Тренировки</span>
        </div>
        <div class="card-metric" id="workouts-metric">—</div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="workouts-progress" style="width:0%"></div>
        </div>
        <div class="card-status" id="workouts-status">Загрузка…</div>
      </div>

      <!-- Work card -->
      <div class="card" data-section="work" role="button" tabindex="0" aria-label="Работа — подробнее">
        <div class="card-header">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <span class="card-label">Работа</span>
        </div>
        <div class="card-metric" id="work-metric">—</div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="work-progress" style="width:0%"></div>
        </div>
        <div class="card-status" id="work-status">Загрузка…</div>
      </div>

    </div>
  </div>

  <!-- Detail overlay -->
  <div id="detail" class="detail-overlay hidden" role="dialog" aria-modal="true">
    <div class="detail-header">
      <button class="back-btn" id="back-btn" aria-label="Назад">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="detail-title" id="detail-title"></h2>
    </div>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
